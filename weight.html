<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trackro · Weight</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png" />
  <link rel="icon" href="icons/favicon-16.png" sizes="16x16" type="image/png" />
  <link rel="icon" href="icons/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="theme-color" content="#0F7A6E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Trackro" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div class="container">

  <div id="app-content" style="display:none">
    <header class="app-header">
      <h1>Trackro</h1>
    </header>

    <nav id="main-nav" style="display:flex; gap:6px; margin-bottom:2rem; flex-wrap:wrap;"></nav>

    <div class="card">
      <h2>Log weight</h2>
      <div class="input-row">
        <div>
          <div class="label">Date</div>
          <input type="date" id="wDate" />
        </div>
        <div>
          <div class="label">Weight (lbs)</div>
          <input type="number" id="wWeight" step="0.1" placeholder="e.g. 182.4" />
        </div>
      </div>
      <div>
        <div class="label">Notes (optional)</div>
        <input type="text" id="wNotes" placeholder="e.g. after workout, fasted" />
      </div>
      <div class="btn-row">
        <button class="btn-primary" id="wSubmit">Save entry</button>
      </div>
      <div class="lock-error" id="wError"></div>
    </div>

    <div class="card">
      <h2>Trend (last 90 days)</h2>
      <div class="chart-wrap">
        <canvas id="wChart"></canvas>
      </div>
    </div>

    <div class="card">
      <h2>History</h2>
      <div id="wHistory"><div class="empty-note">Loading...</div></div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="js/config.js"></script>
<script src="js/supabaseClient.js"></script>
<script src="js/utils.js"></script>
<script src="js/nav.js"></script>
<script src="js/weight.js"></script>
<script src="js/pwa.js"></script>
<script src="js/gate.js"></script>
</body>
</html>
